name: publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE: ghcr.io/jmanoj0905/cpp-tutor
  TRACER: ghcr.io/jmanoj0905/cpp-tutor-tracer

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The valgrind compile dominates build time; the registry cache makes
      # every run after the first fast.
      - name: Build and push per-arch tracer image
        uses: docker/build-push-action@v6
        with:
          context: tracer
          push: true
          tags: ${{ env.TRACER }}:${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.IMAGE }}/cache:tracer-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}/cache:tracer-${{ matrix.arch }},mode=max

      - name: Build app image (local, for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cpp-tutor:smoke
          build-args: |
            TRACER_IMAGE=${{ env.TRACER }}:${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.IMAGE }}/cache:app-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}/cache:app-${{ matrix.arch }},mode=max

      - name: Smoke test
        run: scripts/smoke-container.sh cpp-tutor:smoke

      - name: Push by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            TRACER_IMAGE=${{ env.TRACER }}:${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.IMAGE }}/cache:app-${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
